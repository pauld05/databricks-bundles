name: Continuous Integration & Deployment

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    # Global environment variables for all steps in this job
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python to run pytest
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest; fi

      # Run the mock unit test we created earlier
      - name: Run Mock Unit Tests
        run: |
          pytest tests/

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Test Databricks Connection
        run: |
          databricks bundle validate -e dev
      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main