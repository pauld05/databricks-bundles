resources:
  jobs:
    job_example:
      name: job-example-bundle # exclusive name, it must be unique to avoid any duplication
      parameters:
        - name: TARGET
          default: "${bundle.target}"
      tasks:
        - task_key: task_bundle-cumbap             # unique task key
          job_cluster_key: ${var.cluster_key}
          notebook_task:
            notebook_path: ../../notebooks/transformation_notebook.ipynb                 # out-of-the-box example notebook

      job_clusters:
        - job_cluster_key: ${var.cluster_key}
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            data_security_mode: USER_ISOLATION
            autoscale:
              min_workers: 1
              max_workers: 2